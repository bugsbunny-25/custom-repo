name: Build and Publish Docker Image

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # Required for the --secret build mount used below.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Log in to the Container registry
      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      # Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Buildx attaches provenance/SBOM attestations by default, each
          # pushed as its own manifest referenced by digest (sha256-<digest>)
          # rather than by the tags above - disable both so GHCR's tag list
          # only shows the tags metadata-action actually generated.
          provenance: false
          sbom: false
          # morphe-patcher is resolved from GitHub Packages at build time,
          # which requires authentication even for public packages - reuse
          # this workflow's own token (any authenticated account can read a
          # public GHP package; it does not need access to MorpheApp/morphe-patcher).
          build-args: |
            GITHUB_ACTOR=${{ github.actor }}
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}