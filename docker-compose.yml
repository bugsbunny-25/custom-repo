version: '3.8'

services:
  fdroid-repo:
    image: ghcr.io/bugsbunny-25/custom-repo:main
    container_name: fdroid-repo
    restart: unless-stopped
    
    volumes:
      # Persist the F-Droid repository data
      - ${CONFIG_FOLDER}/fdroid-data/:/srv/fdroid

      # Persist the SQLite database (all app settings, GitHub repos, patch
      # library/targets, checked-release history). Everything is configured
      # through the admin UI's Settings page after first run - there's no
      # config.yml to hand-edit anymore.
      - ${CONFIG_FOLDER}/db:/app/db

      # Optional: persist logs
      - ${CONFIG_FOLDER}/logs:/var/log

    environment:
      - TZ=UTC
      # Root log level for the app (logback.xml reads this, defaulting to
      # INFO if unset). One of ERROR, WARN, INFO, DEBUG, TRACE.
      - LOG_LEVEL=INFO
      # Override for a different DB directory; defaults to /app/db (the
      # app.db file is created inside it automatically if missing)
      # - DB_PATH=/app/db
    
    # Expose port (will be proxied by your nginx reverse proxy)
    ports:
      - "8080:80"  # Change 8080 to your preferred port
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
